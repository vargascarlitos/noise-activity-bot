name: Noise Bot

on:
  schedule:
    - cron: "0 14 * * 1-5"   # 10 AM Paraguay (UTC-4), Lun-Vie
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: noise-bot
  cancel-in-progress: true

jobs:
  run-noise:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout con tu token (PAT)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar bot
        env:
          GITHUB_TOKEN:   ${{ secrets.ACTIONS_PAT }}
          GIT_USER_NAME:  "vargascarlitos"
          GIT_USER_EMAIL: "18080099+vargascarlitos@users.noreply.github.com"
        run: node scripts/noise.js
